events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker embedded DNS — re-resolve upstreams so a container rebuild (new IP)
    # doesn't cause stale-upstream 502s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name restorix.edminformatica.it;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name restorix.edminformatica.it;

        ssl_certificate /etc/letsencrypt/live/restorix.edminformatica.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/restorix.edminformatica.it/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /install.sh {
            alias /srv/agent-dist/install.sh;
            add_header Content-Type text/plain;
            add_header Content-Disposition inline;
        }

        location /agent/ {
            alias /srv/agent-dist/;
        }

        location /api/ {
            set $api_upstream api:8000;
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            client_max_body_size 50m;
        }

        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
