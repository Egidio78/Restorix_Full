
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - '0.0.0.0:8001:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${RESTORE_TEMP_HOST_PATH:-./restore-tmp}:/var/lib/dbshield/restore-tmp
      # Piano 7c Task 4: bind mounts per nginx config + ssl + helper sockets
      - ./nginx-conf:/etc/nginx-host:rw
      - ./ssl:/etc/restorix/ssl:rw
      - ./helper-sockets:/var/run/restorix-helpers:rw
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./agent_releases:/app/agent_releases:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${RESTORE_TEMP_HOST_PATH:-./restore-tmp}:/var/lib/dbshield/restore-tmp
    command: celery -A app.celery_app worker --loglevel=info

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '0.0.0.0:8002:80'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Piano 7c Task 4: helper sidecar containers (Unix socket IPC, NO docker.sock)
  # ---------------------------------------------------------------------------
  nginx-reload-helper:
    build: ./docker/nginx-reload-helper
    container_name: restorix-nginx-helper
    restart: unless-stopped
    volumes:
      - ./nginx-conf:/etc/nginx/conf.d:ro
      - ./helper-sockets:/var/run/restorix-helpers:rw
    environment:
      - SOCKET_PATH=/var/run/restorix-helpers/nginx.sock

  certbot-helper:
    build: ./docker/certbot-helper
    container_name: restorix-certbot-helper
    restart: unless-stopped
    entrypoint: /usr/local/bin/entrypoint.sh
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
      - ./helper-sockets:/var/run/restorix-helpers:rw
    environment:
      - SOCKET_PATH=/var/run/restorix-helpers/certbot.sock

volumes:
  postgres_data:
  redis_data:
